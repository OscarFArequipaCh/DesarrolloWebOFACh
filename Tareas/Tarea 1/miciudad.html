<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Página turística de una ciudad">
    <title>Descubre [Nombre de la Ciudad]</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        h1 {
            color: #ffcc00;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
        .gallery {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .gallery img {
            width: 200px;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
            border: 2px solid #ffcc00;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bienvenidos a [Nombre de la Ciudad]</h1>
        <p>
            Descubre la belleza y la historia de [Nombre de la Ciudad]. 
            Con sus impresionantes paisajes, cultura vibrante y gastronomía única, 
            esta ciudad es un destino imperdible para viajeros de todo el mundo.
        </p>
        <div class="gallery">
            <img src="imagen1.jpg" alt="Lugar turístico 1">
            <img src="imagen2.jpg" alt="Lugar turístico 2">
            <img src="imagen3.jpg" alt="Lugar turístico 3">
        </div>
    </div>
</body>
</html>
