<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Álbum familiar digital">
    <title>Álbum Familiar</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #f6d365, #fda085);
            text-align: center;
            color: #333;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
        }
        h1 {
            color: #d35400;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .gallery img {
            width: 200px;
            height: 200px;
            border-radius: 10px;
            object-fit: cover;
            border: 3px solid #d35400;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mi Álbum Familiar</h1>
        <p>Momentos inolvidables con nuestros seres queridos.</p>
        <div class="gallery">
            <img src="familia1.jpg" alt="Foto familiar 1">
            <img src="familia2.jpg" alt="Foto familiar 2">
            <img src="familia3.jpg" alt="Foto familiar 3">
            <img src="familia4.jpg" alt="Foto familiar 4">
            <img src="familia5.jpg" alt="Foto familiar 5">
        </div>
    </div>
</body>
</html>
