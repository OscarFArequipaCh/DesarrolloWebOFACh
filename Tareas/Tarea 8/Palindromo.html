<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var cadena = prompt("Ingrese una cadena de texto:","");
        esPalindromo(cadena);
        

        function esPalindromo(cadena) {
            cadena = cadena.toLowerCase().replace(/[^a-z0-9]/g, "");
            var cadenaInvertida = cadena.split("").reverse().join("");
            cadena === cadenaInvertida ? alert("La cadena es un palíndromo") : alert("La cadena no es un palíndromo");
        }
        
    </script>
</body>
</html>
