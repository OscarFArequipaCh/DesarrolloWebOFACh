<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var n = prompt("Ingrese el número de términos de la serie de Fibonacci que desea imprimir:");
        n = parseInt(n);
        var fibonacci = [0, 1]; 
        for (var i = 2; i < n; i++) {
            fibonacci[i] = fibonacci[i - 1] + fibonacci[i - 2];
        }
        document.write("Los primeros " + n + " términos de la serie de Fibonacci son: <br>");
        
        for (var i = 0; i < n; i++) {
            document.write(fibonacci[i] + "<br>");
        }

    </script>
</body>
</html>
